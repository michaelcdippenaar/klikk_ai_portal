services:
  klikk-ai-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klikk-ai-portal
    restart: unless-stopped
    network_mode: host
    env_file:
      - backend/.env
    volumes:
      # Config files (editable without rebuild)
      - ./backend/kpi_definitions.yaml:/app/kpi_definitions.yaml
      - ./backend/widget_configs.yaml:/app/widget_configs.yaml
      - ./backend/widget_types.yaml:/app/widget_types.yaml
      - ./backend/credentials:/app/credentials:ro
      # Logs — persisted outside container, readable by klikk_ai_setup
      - ./logs:/app/logs
      # Skills live on the image (mcp_overlay in Dockerfile). Do not mount an empty host dir.
      # MCP server — canonical TM1 + PG tool implementations (used by mcp_bridge)
      - ./mcp_tm1_server:/app/mcp_tm1_server
      # System prompt and tool registry — editable without rebuild
      - ./backend/system_prompt.py:/app/system_prompt.py
      - ./backend/tool_registry.py:/app/tool_registry.py
    environment:
      - PYTHONUNBUFFERED=1
    # Access at http://192.168.1.235:8000
    # Logs at:   ./logs/chat_sessions/
    # Agent skills: baked into image via ./mcp_overlay (see Dockerfile).
